server:
  port: 8081

spring:
  application:
    name: kafka-ui-spring-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://kafkaui.infra.alephys.com:5432/fastapi}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:4lph@123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        physical_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit_strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:sainode1.infra.alephys.com:11092,sainode2.infra.alephys.com:11092,sainode3.infra.alephys.com:11092}
    properties:
      security:
        protocol: SASL_PLAINTEXT
      sasl:
        mechanism: PLAIN
        jaas:
          config: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://10.1.0.201/keycloak/realms/multi-tenant-app}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://10.1.0.201/keycloak/realms/multi-tenant-app/protocol/openid-connect/certs}

logging:
  level:
    org.springframework.security: DEBUG
    com.kafkaui: DEBUG
    org.hibernate.SQL: DEBUG
